# ========================================
# UmbrellaZG 博客系统配置文件
# ========================================

# ===== 应用基本信息 =====
spring.application.name=umbrellazg-backend
spring.profiles.active=dev

# ===== 服务器配置 =====
server.port=8080
server.servlet.context-path=/
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# 服务器超时配置
server.connection-timeout=20000
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10

# ===== 数据库配置 =====
# 生产环境必须使用环境变量注入敏感信息!
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:umbrellazg}?useSSL=true&requireSSL=true&serverTimezone=UTC&autoReconnect=true&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:app_user}
spring.datasource.password=${DB_PASSWORD:}

# 数据库连接池优化 (HikariCP)
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:15}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:30000}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:20000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:1800000}
spring.datasource.hikari.leak-detection-threshold=${DB_LEAK_DETECTION_THRESHOLD:5000}
spring.datasource.hikari.connection-test-query=SELECT 1

# ===== JPA/Hibernate 配置 =====
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:true}
spring.jpa.properties.hibernate.jdbc.batch_size=${HIBERNATE_BATCH_SIZE:20}
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.cache.use_second_level_cache=false

# ===== Redis 配置 =====
# 必须使用强密码并通过环境变量注入!
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.timeout=${REDIS_TIMEOUT:2000}

# Redis 连接池优化 (Lettuce)
spring.data.redis.lettuce.pool.max-active=${REDIS_MAX_ACTIVE:8}
spring.data.redis.lettuce.pool.max-idle=${REDIS_MAX_IDLE:5}
spring.data.redis.lettuce.pool.min-idle=${REDIS_MIN_IDLE:1}
spring.data.redis.lettuce.pool.max-wait=${REDIS_MAX_WAIT:2000}
spring.data.redis.lettuce.shutdown-timeout=${REDIS_SHUTDOWN_TIMEOUT:100}

# ===== 安全配置 =====
# JWT 配置
app.jwt.secret=${JWT_SECRET:your-secret-key-change-in-production}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# 游客登录配置
app.guest.expiration-ms=${GUEST_EXPIRATION_MS:21600000}

# 文件上传配置
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:50MB}
spring.servlet.multipart.enabled=true

# 文件存储配置
app.file.storage.path=${FILE_STORAGE_PATH:./uploads}
app.file.storage.max-attachment-count=${MAX_ATTACHMENT_COUNT:5}

# ===== 日志配置 =====
# 日志级别配置
logging.level.root=${LOG_LEVEL_ROOT:WARN}
logging.level.com.website.backend=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:DEBUG}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOG_LEVEL_SQL_PARAMS:WARN}

# 日志文件配置
logging.file.name=${LOG_FILE_NAME:logs/umbrellazg.log}
logging.file.max-size=${LOG_FILE_MAX_SIZE:10MB}
logging.file.max-history=${LOG_FILE_MAX_HISTORY:30}

# 日志格式配置
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ===== 缓存配置 =====
spring.cache.type=redis
spring.cache.redis.time-to-live=${CACHE_TTL:300000}
spring.cache.redis.cache-null-values=false

# ===== 监控配置 =====
# 健康检查端点
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=${HEALTH_SHOW_DETAILS:when-authorized}

# ===== 静态资源配置 =====
# 防止目录遍历攻击
spring.mvc.static-path-pattern=/static/**
spring.web.resources.static-locations=classpath:/static/

# ===== 跨域配置 =====
# 开发环境允许跨域
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
app.cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}
app.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}

# ===== 性能优化配置 =====
# 异步处理配置
spring.task.execution.pool.core-size=${ASYNC_CORE_SIZE:5}
spring.task.execution.pool.max-size=${ASYNC_MAX_SIZE:10}
spring.task.execution.pool.queue-capacity=${ASYNC_QUEUE_CAPACITY:25}

# ===== 开发环境特殊配置 =====
# 仅在开发环境启用
spring.devtools.restart.enabled=${DEVTOOLS_ENABLED:false}
spring.devtools.livereload.enabled=${LIVERELOAD_ENABLED:false}