# ===== 服务器配置 =====
server.port=8080
server.servlet.context-path=/

# ===== 数据库配置 =====
# 生产环境必须使用环境变量注入密码!
spring.datasource.url=jdbc:mysql://localhost:3306/umbrellazg?useSSL=true&requireSSL=true&serverTimezone=UTC&autoReconnect=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=app_user  # 使用专用应用账号
spring.datasource.password=${DB_PASSWORD}  # 从环境变量获取

# 连接池优化 (HikariCP)
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=5000

# ===== JPA配置 =====
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20  # 批量操作优化
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true  # 防止LazyInitializationException

# ===== Redis配置 =====
# 必须使用强密码并通过环境变量注入!
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD}  # 从环境变量获取
spring.data.redis.database=0

# Redis连接池优化 (Lettuce)
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.lettuce.pool.max-wait=2000
spring.data.redis.lettuce.shutdown-timeout=100

# ===== 安全配置 =====

# 游客登录过期时间 (6小时)
app.guest.expirationMs=21600000

# ===== 日志配置 =====
logging.level.root=WARN
logging.level.com.website.backend=INFO
logging.file.name=app.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# 防止目录遍历攻击
spring.mvc.static-path-pattern=/static/**